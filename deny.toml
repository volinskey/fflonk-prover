# cargo-deny configuration for fflonk-prover
#
# Enforces spec F7.1: all dependencies must be MIT or Apache-2.0
# (or dual MIT/Apache-2.0). No copyleft (GPL/LGPL/MPL/etc).

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[licenses]
# Permissive allowlist per spec F7.1. Unlisted licenses fail.
# Intent: no copyleft (GPL/LGPL/AGPL/MPL/EPL/CDDL). Permissive-only.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[advisories]
yanked = "deny"
ignore = [
    # `paste` (0.3.4) — "unmaintained" notice. Pulled in transitively by
    # the arkworks family (ark-std → ark-bn254 → ark-ec etc). No known
    # vulnerability; `paste` is a compile-time token-manipulation helper
    # with no runtime security surface. We track the upstream arkworks
    # migration off `paste` — when they bump, our warning clears.
    "RUSTSEC-2024-0436",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
